name: GameCalendarNative
options:
  bundleIdPrefix: no.thomasj
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  knownRegions: [nb, en]
  developmentLanguage: nb

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  GameCalendarNative:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: Sources/GameCalendarNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.thomasj.GameCalendarNative
        PRODUCT_NAME: Spillkalender
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: GameCalendarNative.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: false
        release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: false
