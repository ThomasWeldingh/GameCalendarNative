<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#D4960A"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C47F08"/>
      <stop offset="100%" stop-color="#B87308"/>
    </linearGradient>
    <linearGradient id="ctrl-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="40%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="ctrl-grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <radialGradient id="stick-bg" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <filter id="ctrl-shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App icon rounded rect background — Komplett yellow -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle texture overlay -->
  <rect width="1024" height="1024" rx="224" fill="white" opacity="0.05"/>

  <!-- Calendar body -->
  <rect x="122" y="100" width="780" height="560" rx="40" fill="white" opacity="0.97"/>
  <rect x="122" y="100" width="780" height="560" rx="40" fill="none" stroke="#00000015" stroke-width="2"/>

  <!-- Calendar header bar -->
  <path d="M162 100h700c22 0 40 18 40 40v90H122v-90c0-22 18-40 40-40z" fill="url(#header)"/>

  <!-- Calendar rings -->
  <rect x="295" y="68" width="32" height="72" rx="16" fill="#8B6914" stroke="#6B5010" stroke-width="2"/>
  <rect x="697" y="68" width="32" height="72" rx="16" fill="#8B6914" stroke="#6B5010" stroke-width="2"/>

  <!-- Month text -->
  <text x="512" y="195" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="66" font-weight="800" fill="white" letter-spacing="4">MARS 2026</text>

  <!-- Day header row -->
  <g font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="28" font-weight="700" fill="#9CA3AF" text-anchor="middle">
    <text x="202" y="270">M</text>
    <text x="305" y="270">T</text>
    <text x="408" y="270">O</text>
    <text x="512" y="270">T</text>
    <text x="615" y="270">F</text>
    <text x="718" y="270">L</text>
    <text x="822" y="270">S</text>
  </g>

  <!-- Thin separator line -->
  <line x1="152" y1="282" x2="872" y2="282" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Calendar grid dates -->
  <g font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="36" fill="#374151" text-anchor="middle">
    <!-- Row 1 (week 9) -->
    <text x="615" y="330" font-weight="500">1</text>
    <text x="718" y="330" font-weight="500" fill="#9CA3AF">2</text>
    <text x="822" y="330" font-weight="500" fill="#9CA3AF">3</text>
    <!-- Row 2 (week 10) -->
    <text x="202" y="395" font-weight="500">4</text>
    <text x="305" y="395" font-weight="500">5</text>
    <text x="408" y="395" font-weight="500">6</text>
    <text x="512" y="395" font-weight="500">7</text>
    <text x="615" y="395" font-weight="500">8</text>
    <text x="718" y="395" font-weight="500" fill="#9CA3AF">9</text>
    <text x="822" y="395" font-weight="500" fill="#9CA3AF">10</text>
    <!-- Row 3 (week 11) -->
    <text x="202" y="460" font-weight="500">11</text>
    <text x="305" y="460" font-weight="500">12</text>
    <text x="408" y="460" font-weight="500">13</text>
    <text x="512" y="460" font-weight="500">14</text>
    <text x="615" y="460" font-weight="500">15</text>
    <text x="718" y="460" font-weight="500" fill="#9CA3AF">16</text>
    <text x="822" y="460" font-weight="500" fill="#9CA3AF">17</text>
    <!-- Row 4 partial -->
    <text x="202" y="525" font-weight="500">18</text>
    <text x="305" y="525" font-weight="500">19</text>
    <text x="408" y="525" font-weight="500">20</text>
    <text x="512" y="525" font-weight="500">21</text>
    <text x="615" y="525" font-weight="500">22</text>
    <text x="718" y="525" font-weight="500" fill="#9CA3AF">23</text>
    <text x="822" y="525" font-weight="500" fill="#9CA3AF">24</text>
    <!-- Row 5 -->
    <text x="202" y="590" font-weight="500">25</text>
    <text x="305" y="590" font-weight="500">26</text>
    <text x="408" y="590" font-weight="500">27</text>
    <text x="512" y="590" font-weight="500">28</text>
    <text x="615" y="590" font-weight="500">29</text>
    <text x="718" y="590" font-weight="500" fill="#9CA3AF">30</text>
    <text x="822" y="590" font-weight="500" fill="#9CA3AF">31</text>
  </g>

  <!-- Highlight "today" circle -->
  <circle cx="512" cy="385" r="28" fill="#EDB32A"/>
  <text x="512" y="397" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="700" fill="white">7</text>

  <!-- Small game release dots on a few dates -->
  <circle cx="615" cy="340" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="305" cy="405" r="5" fill="#3B82F6" opacity="0.8"/>
  <circle cx="202" cy="470" r="5" fill="#22C55E" opacity="0.8"/>
  <circle cx="615" cy="470" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="408" cy="535" r="5" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="202" cy="600" r="5" fill="#3B82F6" opacity="0.8"/>

  <!-- ======= REALISTIC GAME CONTROLLER ======= -->
  <g transform="translate(460, 600)" filter="url(#ctrl-shadow)">

    <!-- Main controller body — modern rounded shape -->
    <path d="M280,50 C340,50 380,70 400,100 C420,130 430,165 440,200
             C450,240 460,275 440,300 C420,330 380,345 350,340
             C320,335 300,310 280,280 L280,280
             C270,265 265,250 260,240 L220,240
             C215,250 210,265 200,280
             C180,310 160,335 130,340
             C100,345 60,330 40,300
             C20,275 30,240 40,200
             C50,165 60,130 80,100
             C100,70 140,50 200,50 Z"
          fill="url(#ctrl-body)" stroke="#3A3A3A" stroke-width="2"/>

    <!-- Surface texture highlight -->
    <path d="M280,55 C340,55 375,73 395,100 C410,125 420,155 430,190
             C438,220 440,250 430,275 C420,300 395,315 370,315
             C345,315 325,295 305,270 C290,252 282,235 275,220
             L205,220
             C198,235 190,252 175,270
             C155,295 135,315 110,315
             C85,315 60,300 50,275
             C40,250 42,220 50,190
             C60,155 70,125 85,100
             C105,73 140,55 200,55 Z"
          fill="none" stroke="white" stroke-width="1" opacity="0.08"/>

    <!-- Left grip texture lines -->
    <path d="M75,180 Q60,220 55,260" stroke="#2A2A2A" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M85,175 Q70,215 65,255" stroke="#2A2A2A" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Right grip texture lines -->
    <path d="M405,180 Q420,220 425,260" stroke="#2A2A2A" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M395,175 Q410,215 415,255" stroke="#2A2A2A" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- D-PAD -->
    <g transform="translate(120, 120)">
      <!-- D-pad base circle -->
      <circle cx="0" cy="0" r="42" fill="#151515" stroke="#0A0A0A" stroke-width="1"/>
      <!-- Vertical bar -->
      <rect x="-12" y="-35" width="24" height="70" rx="4" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1"/>
      <!-- Horizontal bar -->
      <rect x="-35" y="-12" width="70" height="24" rx="4" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1"/>
      <!-- Center dot -->
      <circle cx="0" cy="0" r="6" fill="#1A1A1A"/>
      <!-- Arrow indicators -->
      <polygon points="0,-26 -6,-18 6,-18" fill="#444"/>
      <polygon points="0,26 -6,18 6,18" fill="#444"/>
      <polygon points="-26,0 -18,-6 -18,6" fill="#444"/>
      <polygon points="26,0 18,-6 18,6" fill="#444"/>
    </g>

    <!-- LEFT ANALOG STICK -->
    <g transform="translate(175, 190)">
      <circle cx="0" cy="0" r="28" fill="url(#stick-bg)" stroke="#0A0A0A" stroke-width="2"/>
      <circle cx="0" cy="0" r="18" fill="#2D2D2D" stroke="#222" stroke-width="1"/>
      <!-- Concentric texture rings -->
      <circle cx="0" cy="0" r="14" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
    </g>

    <!-- RIGHT ANALOG STICK -->
    <g transform="translate(305, 190)">
      <circle cx="0" cy="0" r="28" fill="url(#stick-bg)" stroke="#0A0A0A" stroke-width="2"/>
      <circle cx="0" cy="0" r="18" fill="#2D2D2D" stroke="#222" stroke-width="1"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#3A3A3A" stroke-width="0.5"/>
    </g>

    <!-- FACE BUTTONS (XYAB style) -->
    <g transform="translate(360, 120)">
      <!-- Top — Y (yellow) -->
      <circle cx="0" cy="-30" r="16" fill="#E8A000" stroke="#B07800" stroke-width="1.5"/>
      <text x="0" y="-24" text-anchor="middle" font-family="SF Pro, Helvetica" font-size="16" font-weight="700" fill="white">Y</text>
      <!-- Right — B (red) -->
      <circle cx="30" cy="0" r="16" fill="#DC2626" stroke="#A01C1C" stroke-width="1.5"/>
      <text x="30" y="6" text-anchor="middle" font-family="SF Pro, Helvetica" font-size="16" font-weight="700" fill="white">B</text>
      <!-- Bottom — A (green) -->
      <circle cx="0" cy="30" r="16" fill="#16A34A" stroke="#0F7A38" stroke-width="1.5"/>
      <text x="0" y="36" text-anchor="middle" font-family="SF Pro, Helvetica" font-size="16" font-weight="700" fill="white">A</text>
      <!-- Left — X (blue) -->
      <circle cx="-30" cy="0" r="16" fill="#2563EB" stroke="#1A4FBF" stroke-width="1.5"/>
      <text x="-30" y="6" text-anchor="middle" font-family="SF Pro, Helvetica" font-size="16" font-weight="700" fill="white">X</text>
    </g>

    <!-- Center buttons (menu / options) -->
    <rect x="210" y="105" width="22" height="10" rx="5" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="248" y="105" width="22" height="10" rx="5" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="1"/>

    <!-- Guide / home button -->
    <circle cx="240" cy="85" r="12" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="1.5"/>
    <circle cx="240" cy="85" r="7" fill="#EDB32A" opacity="0.8"/>

    <!-- Shoulder button hints (top edges) -->
    <rect x="60" y="48" width="80" height="12" rx="6" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1"/>
    <rect x="340" y="48" width="80" height="12" rx="6" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1"/>
  </g>
</svg>
